default: &default
  adapter: sqlite3
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  primary:
    <<: *default
    database: storage/development.sqlite3
  account:
    <<: *default
    database: storage/development_account.sqlite3
    migrations_paths: db/account_migrate
  workspace:
    <<: *default
    database: storage/development_workspace.sqlite3
    migrations_paths: db/workspace_migrate

test:
  primary:
    <<: *default
    database: storage/test.sqlite3
  account:
    <<: *default
    database: storage/test_account.sqlite3
    migrations_paths: db/account_migrate
  workspace:
    <<: *default
    database: storage/test_workspace.sqlite3
    migrations_paths: db/workspace_migrate

production:
  primary:
    <<: *default
    database: storage/production.sqlite3
  account:
    <<: *default
    database: storage/production_account.sqlite3
    migrations_paths: db/account_migrate
  workspace:
    <<: *default
    database: storage/production_workspace.sqlite3
    migrations_paths: db/workspace_migrate
  cache:
    <<: *default
    database: storage/production_cache.sqlite3
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: storage/production_queue.sqlite3
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: storage/production_cable.sqlite3
    migrations_paths: db/cable_migrate
