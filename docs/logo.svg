<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="480" height="480">
  <defs>
    <!-- Container body gradient - glossy white plastic -->
    <linearGradient id="body" x1="0.2" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#f7f4ef"/>
      <stop offset="35%" stop-color="#eee9e0"/>
      <stop offset="100%" stop-color="#d8d2c8"/>
    </linearGradient>
    <!-- Lid gradient - rich red -->
    <linearGradient id="lid" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#e04040"/>
      <stop offset="50%" stop-color="#c42828"/>
      <stop offset="100%" stop-color="#9a1c1c"/>
    </linearGradient>
    <!-- Lid top -->
    <linearGradient id="lidTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e85050"/>
      <stop offset="100%" stop-color="#b82525"/>
    </linearGradient>
    <!-- Red stripe gradient -->
    <linearGradient id="stripe" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#d43030"/>
      <stop offset="50%" stop-color="#c02525"/>
      <stop offset="100%" stop-color="#a01e1e"/>
    </linearGradient>
    <!-- Glossy highlight -->
    <linearGradient id="gloss" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Shadow under container -->
    <radialGradient id="floorShadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Floor shadow -->
  <ellipse cx="60" cy="112" rx="32" ry="6" fill="url(#floorShadow)"/>

  <!-- === CONTAINER BODY === -->
  <rect x="30" y="32" width="60" height="78" rx="8" ry="8" fill="url(#body)"/>

  <!-- Shoulder taper -->
  <path d="M34,32 Q34,24 42,20 L78,20 Q86,24 86,32 Z" fill="url(#body)"/>

  <!-- === LID === -->
  <rect x="40" y="6" width="40" height="16" rx="5" ry="5" fill="url(#lid)"/>
  <ellipse cx="60" cy="7" rx="20" ry="4" fill="url(#lidTop)"/>
  <!-- Lid grip lines -->
  <line x1="43" y1="12" x2="77" y2="12" stroke="#a01e1e" stroke-width="0.5" opacity="0.4"/>
  <line x1="43" y1="15" x2="77" y2="15" stroke="#a01e1e" stroke-width="0.5" opacity="0.4"/>
  <line x1="43" y1="18" x2="77" y2="18" stroke="#a01e1e" stroke-width="0.5" opacity="0.4"/>

  <!-- === LABEL (centered in body) === -->

  <!-- Top red strip -->
  <rect x="30" y="44" width="60" height="7" rx="0.5" fill="url(#stripe)"/>

  <!-- RAILS text -->
  <text x="60" y="65" font-family="-apple-system, SF Pro Display, Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="900" fill="#cc2222" text-anchor="middle" letter-spacing="1.5">RAILS</text>

  <!-- WHEY text -->
  <text x="60" y="79" font-family="-apple-system, SF Pro Display, Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="900" fill="#cc2222" text-anchor="middle" letter-spacing="0.5">WHEY</text>

  <!-- Tagline -->
  <text x="60" y="87" font-family="Georgia, Times New Roman, serif" font-size="4" font-style="italic" fill="#999" text-anchor="middle" letter-spacing="0.2">Strength from fundamentals</text>

  <!-- Bottom red strip -->
  <rect x="30" y="91" width="60" height="7" rx="0.5" fill="url(#stripe)"/>

  <!-- === GLOSSY OVERLAY (Apple emoji shine) === -->
  <path d="M34,32 Q34,24 42,20 L78,20 Q86,24 86,32 L86,100 Q86,108 78,108 L42,108 Q34,108 34,100 Z" fill="url(#gloss)" opacity="0.5"/>

  <!-- Extra shine highlight on upper left -->
  <ellipse cx="46" cy="38" rx="8" ry="18" fill="white" opacity="0.12" transform="rotate(-10, 46, 38)"/>
</svg>
